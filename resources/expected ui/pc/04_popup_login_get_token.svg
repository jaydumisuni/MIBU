<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700"><rect width="1000" height="700" fill="#050913"/><rect x="28" y="28" width="944" height="644" rx="28" fill="#0a1222" stroke="#29466f" stroke-width="2"/><g id="close-affordance"><circle cx="950" cy="55" r="20" fill="#101a2d" stroke="#3978c9" stroke-width="2"/><path d="M942 47 L958 63 M958 47 L942 63" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/></g><text x="60" y="90" fill="#fff" font-family="Segoe UI" font-size="34" font-weight="700">Login &amp; Get Tokens</text><text x="60" y="124" fill="#9fb1cf" font-family="Segoe UI" font-size="17">The user signs in themselves. MIBU receives only the two explicit token values.</text><rect x="60" y="165" width="420" height="250" rx="18" fill="#0e192c" stroke="#20375c"/><text x="88" y="205" fill="#ffb36f" font-family="Segoe UI" font-size="21" font-weight="700">Firefox capture</text><text x="88" y="242" fill="#fff" font-family="Segoe UI" font-size="17">new_bbs_serviceToken</text><text x="88" y="282" fill="#9fb1cf" font-family="Segoe UI" font-size="15">Captured once.</text><text x="88" y="315" fill="#9fb1cf" font-family="Segoe UI" font-size="15">Used internally for slots 1 and 3.</text><text x="88" y="355" fill="#6cd3ff" font-family="Segoe UI" font-size="15">Status: waiting for paste</text><rect x="520" y="165" width="420" height="250" rx="18" fill="#0e192c" stroke="#20375c"/><text x="548" y="205" fill="#7ec8ff" font-family="Segoe UI" font-size="21" font-weight="700">Chrome capture</text><text x="548" y="242" fill="#fff" font-family="Segoe UI" font-size="17">popRunToken</text><text x="548" y="282" fill="#9fb1cf" font-family="Segoe UI" font-size="15">Captured once.</text><text x="548" y="315" fill="#9fb1cf" font-family="Segoe UI" font-size="15">Used internally for slots 2 and 4.</text><text x="548" y="355" fill="#6cd3ff" font-family="Segoe UI" font-size="15">Status: waiting for paste</text><rect x="60" y="445" width="880" height="72" rx="16" fill="#0b1528" stroke="#28456f"/><text x="88" y="475" fill="#fff" font-family="Segoe UI" font-size="18" font-weight="700">Two captures → four internal lanes</text><text x="88" y="501" fill="#9fb1cf" font-family="Segoe UI" font-size="15">No four-login flow. No Xiaomi password is stored by MIBU.</text><rect x="180" y="585" width="200" height="56" rx="14" fill="#101a2d" stroke="#3978c9" stroke-width="2"/><text x="280" y="621" fill="#fff" font-family="Segoe UI" font-size="16" font-weight="700" text-anchor="middle">OPEN BROWSER</text><rect x="405" y="585" width="190" height="56" rx="14" fill="#101a2d" stroke="#3978c9" stroke-width="2"/><text x="500" y="621" fill="#fff" font-family="Segoe UI" font-size="16" font-weight="700" text-anchor="middle">PASTE ONE</text><rect x="620" y="585" width="300" height="56" rx="14" fill="#101a2d" stroke="#3978c9" stroke-width="2"/><text x="770" y="621" fill="#fff" font-family="Segoe UI" font-size="16" font-weight="700" text-anchor="middle">PASTE TWO TOKENS</text></svg>