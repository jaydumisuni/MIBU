<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700"><rect width="1000" height="700" fill="#050913"/><rect x="28" y="28" width="944" height="644" rx="28" fill="#0a1222" stroke="#29466f" stroke-width="2"/><text x="60" y="90" fill="#fff" font-family="Segoe UI" font-size="34" font-weight="700">Install MIBU APK</text><text x="60" y="124" fill="#9fb1cf" font-family="Segoe UI" font-size="17">The helper uses the bundled APK first and lets you browse only when needed.</text><rect x="60" y="165" width="880" height="110" rx="18" fill="#0e192c" stroke="#20375c"/><text x="88" y="205" fill="#fff" font-family="Segoe UI" font-size="20" font-weight="700">APK Source</text><text x="88" y="240" fill="#8fd0ff" font-family="Consolas" font-size="16">release\MIBU-PC-Helper\dist\MIBU.apk</text><rect x="60" y="300" width="880" height="205" rx="18" fill="#0e192c" stroke="#20375c"/><text x="88" y="340" fill="#fff" font-family="Segoe UI" font-size="20" font-weight="700">Install flow</text><g fill="#c7d3e6" font-family="Segoe UI" font-size="17"><text x="90" y="382">1. Confirm ADB device is online.</text><text x="90" y="418">2. Run adb install -r against the selected APK.</text><text x="90" y="454">3. Confirm Success, then open MIBU automatically.</text><text x="90" y="490">4. Keep the exact error output if Android blocks installation.</text></g><rect x="430" y="558" width="210" height="60" rx="14" fill="#101a2d" stroke="#3978c9" stroke-width="2"/><text x="535" y="596" fill="#fff" font-family="Segoe UI" font-size="17" font-weight="700" text-anchor="middle">BROWSE APK</text><rect x="660" y="558" width="230" height="60" rx="14" fill="#13213a" stroke="#ff7a2b" stroke-width="3"/><text x="775" y="596" fill="#fff" font-family="Segoe UI" font-size="17" font-weight="700" text-anchor="middle">INSTALL APK</text></svg>