<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700"><rect width="1000" height="700" fill="#050913"/><rect x="28" y="28" width="944" height="644" rx="28" fill="#0a1222" stroke="#29466f" stroke-width="2"/><text x="60" y="90" fill="#fff" font-family="Segoe UI" font-size="34" font-weight="700">Device Check</text><text x="60" y="124" fill="#9fb1cf" font-family="Segoe UI" font-size="17">MIBU waits until ADB reports one authorized online device.</text><g font-family="Segoe UI"><rect x="60" y="165" width="880" height="78" rx="16" fill="#0e192c" stroke="#20375c"/><text x="88" y="198" fill="#fff" font-size="19" font-weight="700">1. Connect phone by USB</text><text x="88" y="224" fill="#9fb1cf" font-size="15">Use a working data cable and keep the phone unlocked.</text><rect x="60" y="260" width="880" height="78" rx="16" fill="#0e192c" stroke="#20375c"/><text x="88" y="293" fill="#fff" font-size="19" font-weight="700">2. Enable USB debugging</text><text x="88" y="319" fill="#9fb1cf" font-size="15">Developer Options → USB debugging. OEM unlocking should already be enabled.</text><rect x="60" y="355" width="880" height="78" rx="16" fill="#0e192c" stroke="#20375c"/><text x="88" y="388" fill="#fff" font-size="19" font-weight="700">3. Accept RSA authorization</text><text x="88" y="414" fill="#9fb1cf" font-size="15">Tick “Always allow from this computer” and tap Allow.</text><rect x="60" y="450" width="880" height="78" rx="16" fill="#0e192c" stroke="#20375c"/><text x="88" y="483" fill="#fff" font-size="19" font-weight="700">4. Recheck until online</text><text x="88" y="509" fill="#9fb1cf" font-size="15">No device, unauthorized and offline each produce a specific fix message.</text></g><rect x="420" y="585" width="210" height="55" rx="14" fill="#101a2d" stroke="#3978c9" stroke-width="2"/><text x="525" y="620" fill="#fff" font-family="Segoe UI" font-size="17" font-weight="700" text-anchor="middle">OPEN ADB HELP</text><rect x="650" y="585" width="250" height="55" rx="14" fill="#101a2d" stroke="#3978c9" stroke-width="2"/><text x="775" y="620" fill="#fff" font-family="Segoe UI" font-size="17" font-weight="700" text-anchor="middle">RECHECK DEVICE</text></svg>