<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="700" viewBox="0 0 1000 700"><rect width="1000" height="700" fill="#050913"/><rect x="28" y="28" width="944" height="644" rx="28" fill="#0a1222" stroke="#29466f" stroke-width="2"/><g id="close-affordance"><circle cx="950" cy="55" r="20" fill="#101a2d" stroke="#3978c9" stroke-width="2"/><path d="M942 47 L958 63 M958 47 L942 63" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/></g><text x="60" y="90" fill="#fff" font-family="Segoe UI" font-size="34" font-weight="700">Continue on Phone</text><text x="60" y="124" fill="#9fb1cf" font-family="Segoe UI" font-size="17">The helper proves each phone state before allowing the next handoff.</text><g font-family="Segoe UI"><rect x="60" y="165" width="270" height="300" rx="18" fill="#0e192c" stroke="#20375c"/><text x="88" y="205" fill="#fff" font-size="20" font-weight="700">1. Open MIBU</text><text x="88" y="244" fill="#9fb1cf" font-size="15">Confirm:</text><text x="88" y="276" fill="#c7d3e6" font-size="15">• both fresh captures ready</text><text x="88" y="306" fill="#c7d3e6" font-size="15">• mobile data on</text><text x="88" y="336" fill="#c7d3e6" font-size="15">• Wi-Fi off</text><text x="88" y="366" fill="#c7d3e6" font-size="15">• Community state saved</text><rect x="365" y="165" width="270" height="300" rx="18" fill="#0e192c" stroke="#20375c"/><text x="393" y="205" fill="#fff" font-size="20" font-weight="700">2. Start Waiting</text><text x="393" y="244" fill="#9fb1cf" font-size="15">PC Helper proves:</text><text x="393" y="276" fill="#c7d3e6" font-size="15">• captures are READY</text><text x="393" y="306" fill="#c7d3e6" font-size="15">• WAITING_ARMED state</text><text x="393" y="336" fill="#c7d3e6" font-size="15">• one persisted target</text><text x="393" y="366" fill="#c7d3e6" font-size="15">• four hidden windows</text><rect x="670" y="165" width="270" height="300" rx="18" fill="#0e192c" stroke="#20375c"/><text x="698" y="205" fill="#fff" font-size="20" font-weight="700">3. Verify</text><text x="698" y="244" fill="#9fb1cf" font-size="15">Only after timing proof:</text><text x="698" y="276" fill="#c7d3e6" font-size="15">• reboot to fastboot</text><text x="698" y="306" fill="#c7d3e6" font-size="15">• require one fastboot device</text><text x="698" y="336" fill="#c7d3e6" font-size="15">• read device info</text><text x="698" y="366" fill="#c7d3e6" font-size="15">• hand off to Mi Unlock</text></g><rect x="80" y="560" width="200" height="56" rx="14" fill="#101a2d" stroke="#3978c9" stroke-width="2"/><text x="180" y="596" fill="#fff" font-family="Segoe UI" font-size="16" font-weight="700" text-anchor="middle">OPEN MIBU</text><rect x="300" y="560" width="220" height="56" rx="14" fill="#101a2d" stroke="#3978c9" stroke-width="2"/><text x="410" y="596" fill="#fff" font-family="Segoe UI" font-size="16" font-weight="700" text-anchor="middle">START WAITING</text><rect x="540" y="560" width="230" height="56" rx="14" fill="#101a2d" stroke="#3978c9" stroke-width="2"/><text x="655" y="596" fill="#fff" font-family="Segoe UI" font-size="16" font-weight="700" text-anchor="middle">VERIFY FASTBOOT</text><rect x="790" y="560" width="120" height="56" rx="14" fill="#101a2d" stroke="#3978c9" stroke-width="2"/><text x="850" y="596" fill="#fff" font-family="Segoe UI" font-size="16" font-weight="700" text-anchor="middle">DONE</text></svg>