name: Build MIBU

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android:
    name: Android compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Assemble debug
        run: gradle :android:app:assembleDebug

  pc-helper:
    name: PC helper check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Syntax check CLI helper
        run: python -m py_compile pc-helper/mibu_pc_helper.py
      - name: Syntax check Qt6 UI helper
        run: python -m py_compile pc-helper/qt6/mibu_pc_helper_ui.py
      - name: Syntax check final Qt6 helper
        run: python -m py_compile pc-helper/qt6/mibu_pc_helper_final.py
      - name: Syntax check Qt6 actions
        run: python -m py_compile pc-helper/qt6/mibu_actions.py
      - name: Syntax check dependency checker
        run: python -m py_compile pc-helper/qt6/dependency_check.py
      - name: Time command smoke test
        run: python pc-helper/mibu_pc_helper.py time
