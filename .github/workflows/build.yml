name: Build MIBU

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  source-review:
    name: THETECHGUY source contract review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile review validators
        run: |
          python -m py_compile tools/review_contracts.py
          python -m py_compile tools/validate_android_ui_baseline.py
      - name: Validate restored approved Android UI baseline
        run: python tools/validate_android_ui_baseline.py
      - name: Validate implementation against agreed architecture
        run: python tools/review_contracts.py

  android:
    name: Android compile and timing tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Run Android unit tests
        run: gradle :android:app:testDebugUnitTest
      - name: Assemble debug APK
        run: gradle :android:app:assembleDebug
      - name: Verify APK artifact exists
        run: test -s android/app/build/outputs/apk/debug/app-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: MIBU-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  pc-helper:
    name: PC helper source, timing and visual contract
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt requirements
        run: python -m pip install -r pc-helper/qt6/requirements.txt
      - name: Compile active sources
        run: |
          python -m py_compile pc-helper/mibu_pc_helper.py
          python -m py_compile pc-helper/qt6/mibu_actions.py
          python -m py_compile pc-helper/qt6/mibu_status.py
          python -m py_compile pc-helper/qt6/dependency_check.py
          python -m py_compile pc-helper/qt6/ui_geometry.py
          python -m py_compile pc-helper/qt6/render_svg_assets.py
          python -m py_compile pc-helper/qt6/validate_ui_contract.py
          python -m py_compile pc-helper/qt6/mibu_pc_helper_v2.py
          python -m py_compile pc-helper/qt6/mibu_pc_helper_v3.py
          python -m py_compile pc-helper/qt6/test_contracts.py
          python -m py_compile tools/review_contracts.py
          python -m py_compile tools/validate_android_ui_baseline.py
      - name: Run PC helper unit tests
        working-directory: pc-helper/qt6
        run: python -m unittest -v test_contracts.py
      - name: Validate restored Android expected UI
        run: python tools/validate_android_ui_baseline.py
      - name: Validate hotspot artwork against shared click contract
        run: python pc-helper/qt6/validate_ui_contract.py
      - name: Render required hotspot and icon assets
        run: python pc-helper/qt6/render_svg_assets.py
      - name: Verify all rendered assets and approved Android baseline
        run: |
          test -s "resources/expected ui/pc/01_pc_main_four_button_workflow.png"
          test -s "resources/expected ui/pc/02_popup_device_check_guide.png"
          test -s "resources/expected ui/pc/03_popup_install_apk.png"
          test -s "resources/expected ui/pc/04_popup_login_get_token.png"
          test -s "resources/expected ui/pc/05_popup_phone_guide.png"
          test -s "resources/expected ui/pc/mibu_app_icon.png"
          test -s "resources/expected ui/pc/mibu_app_icon.ico"
          test -s "resources/expected ui/android/approved_android_ui_baseline_sheet.svg"
          test -s "resources/expected ui/android/README.md"
      - name: Qt v3 construction, geometry, icon and time math smoke test
        run: |
          python - <<'PY'
          import os, sys
          os.environ['QT_QPA_PLATFORM'] = 'offscreen'
          sys.path.insert(0, 'pc-helper/qt6')
          from PySide6.QtWidgets import QApplication
          import mibu_pc_helper_v2 as base
          import mibu_pc_helper_v3 as mibu
          from ui_geometry import SCREENS
          target = base.next_target()
          assert target.tzinfo is not None
          assert (target.hour, target.minute, target.second, target.microsecond) == (23, 59, 58, 600000)
          app = QApplication([])
          window = mibu.Window()
          assert set(window.buttons) == set(SCREENS['main'].hotspots)
          assert window.main_image.endswith(SCREENS['main'].png)
          assert not window.windowIcon().isNull()
          assert window.minimumWidth() >= 900
          assert window.minimumHeight() >= 600
          window.close()
          app.quit()
          print('Qt v3 construction, geometry, icon and timing proof passed')
          PY
      - name: CLI time smoke test
        run: python pc-helper/mibu_pc_helper.py time

  windows-release:
    name: Complete Windows release proof
    needs: [source-review, android, pc-helper]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: android-actions/setup-android@v3
      - name: Install Android platform-tools
        shell: powershell
        run: sdkmanager "platform-tools"
      - uses: actions/download-artifact@v4
        with:
          name: MIBU-debug-apk
          path: android/app/build/outputs/apk/debug
      - name: Build complete release
        shell: powershell
        run: .\pc-helper\build_windows.ps1
      - name: Verify release contract
        shell: powershell
        run: |
          $root = "pc-helper\release\MIBU-PC-Helper"
          $required = @(
            "$root\MIBU-PC-Helper.exe",
            "$root\dist\MIBU.apk",
            "$root\platform-tools\adb.exe",
            "$root\platform-tools\fastboot.exe",
            "$root\platform-tools\AdbWinApi.dll",
            "$root\platform-tools\AdbWinUsbApi.dll",
            "$root\resources\expected ui\pc\01_pc_main_four_button_workflow.png",
            "$root\resources\expected ui\pc\02_popup_device_check_guide.png",
            "$root\resources\expected ui\pc\03_popup_install_apk.png",
            "$root\resources\expected ui\pc\04_popup_login_get_token.png",
            "$root\resources\expected ui\pc\05_popup_phone_guide.png",
            "$root\resources\expected ui\pc\mibu_app_icon.png",
            "$root\resources\expected ui\pc\mibu_app_icon.ico",
            "$root\resources\expected ui\android\approved_android_ui_baseline_sheet.svg",
            "$root\resources\expected ui\android\README.md"
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) { throw "Release contract missing: $path" }
            if ((Get-Item $path).Length -le 0) { throw "Release contract empty: $path" }
          }
      - uses: actions/upload-artifact@v4
        with:
          name: MIBU-PC-Helper-Windows
          path: pc-helper/release/MIBU-PC-Helper
          if-no-files-found: error
