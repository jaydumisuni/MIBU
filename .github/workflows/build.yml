name: Build MIBU

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  source-review:
    name: THETECHGUY source contract review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compile review validators
        run: |
          python -m py_compile tools/review_contracts.py
          python -m py_compile tools/review_proof_v3.py
          python -m py_compile tools/validate_android_ui_baseline.py
      - name: Validate restored approved Android UI baseline
        run: python tools/validate_android_ui_baseline.py
      - name: Validate implementation against agreed architecture
        run: python tools/review_contracts.py
      - name: Validate proof protocol and source-fresh release rules
        run: python tools/review_proof_v3.py

  android:
    name: Android lint, unit tests and APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'
      - name: Run Android lint and unit tests
        run: gradle :android:app:lintDebug :android:app:testDebugUnitTest
      - name: Assemble debug APK
        run: gradle :android:app:assembleDebug
      - name: Verify APK artifact exists
        run: test -s android/app/build/outputs/apk/debug/app-debug.apk
      - uses: actions/upload-artifact@v4
        with:
          name: MIBU-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  pc-helper:
    name: PC helper source, timing and visual contract
    runs-on: ubuntu-latest
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Qt requirements
        run: python -m pip install -r pc-helper/qt6/requirements.txt
      - name: Compile active sources and tests
        run: |
          python -m py_compile pc-helper/mibu_pc_helper.py
          python -m py_compile pc-helper/qt6/mibu_actions.py
          python -m py_compile pc-helper/qt6/mibu_status.py
          python -m py_compile pc-helper/qt6/dependency_check.py
          python -m py_compile pc-helper/qt6/mibu_runtime.py
          python -m py_compile pc-helper/qt6/mibu_browser_capture.py
          python -m py_compile pc-helper/qt6/mibu_phone_agent.py
          python -m py_compile pc-helper/qt6/mibu_pc_helper_v3.py
          python -m py_compile pc-helper/qt6/test_contracts.py
          python -m py_compile pc-helper/qt6/test_install_contracts.py
          python -m py_compile tools/review_contracts.py
          python -m py_compile tools/review_proof_v3.py
          python -m py_compile tools/validate_android_ui_baseline.py
      - name: Run all PC helper unit tests
        working-directory: pc-helper/qt6
        run: python -m unittest discover -v
      - name: Validate restored Android expected UI
        run: python tools/validate_android_ui_baseline.py
      - name: Generate and verify live UI assets
        run: |
          python tools/extract_live_ui_assets.py
          test -s "resources/logo.png"
          test -s "resources/live_ui/mibu_logo.png"
          test -s "resources/live_ui/mibu_hood.png"
          test -s "resources/live_ui/mibu_app_icon.ico"
          test -s "resources/live_ui/firefox.png"
          test -s "resources/live_ui/chrome.png"
          test -s "resources/guide/index.html"
          test -s "resources/expected ui/android/approved_android_ui_baseline_sheet.svg"
          test -s "resources/expected ui/android/README.md"
      - name: Qt live construction, controls, assistant and time smoke test
        run: |
          python - <<'PY'
          import os, sys
          os.environ['QT_QPA_PLATFORM'] = 'offscreen'
          sys.path.insert(0, 'pc-helper/qt6')
          from PySide6.QtWidgets import QApplication
          import mibu_actions
          import mibu_runtime as runtime
          import mibu_pc_helper_v3 as mibu
          target = runtime.next_target()
          assert target.tzinfo is not None
          assert (target.hour, target.minute, target.second, target.microsecond) == (23, 59, 58, 600000)
          assert mibu_actions.EXPECTED_APP_VERSION == '0.3.0-dev'
          app = QApplication([])
          window = mibu.Window()
          assert set(window.buttons) == {'Device Check', 'Install APK', 'Login & Get Token', 'Phone Guide'}
          assert not window.windowIcon().isNull()
          assert (window.width(), window.height()) == (760, 560)
          assert (window.minimumWidth(), window.minimumHeight()) == (720, 520)
          assert (window.assistant.width(), window.assistant.height()) == (146, 58)
          window.assistant.expand()
          assert (window.assistant.width(), window.assistant.height()) == (280, 326)
          window.assistant.toggle_chat()
          assert (window.assistant.width(), window.assistant.height()) == (280, 470)
          window.close()
          app.quit()
          print('Qt live controls, assistant, icon, version and timing proof passed')
          PY
      - name: CLI time smoke test
        run: python pc-helper/mibu_pc_helper.py time

  windows-release:
    name: Complete Windows release proof
    needs: [source-review, android, pc-helper]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - uses: android-actions/setup-android@v3
      - name: Install Android platform-tools
        shell: powershell
        run: sdkmanager "platform-tools"
      - uses: actions/download-artifact@v4
        with:
          name: MIBU-debug-apk
          path: android/app/build/outputs/apk/debug
      - name: Build complete release from current CI artifact
        shell: powershell
        run: .\pc-helper\build_windows.ps1 -UseExistingApk
      - name: Verify release contract
        shell: powershell
        run: |
          $root = "pc-helper\release\MIBU-PC-Helper"
          $required = @(
            "$root\MIBU-PC-Helper.exe",
            "$root\dist\MIBU.apk",
            "$root\platform-tools\adb.exe",
            "$root\platform-tools\fastboot.exe",
            "$root\platform-tools\AdbWinApi.dll",
            "$root\platform-tools\AdbWinUsbApi.dll",
            "$root\resources\logo.png",
            "$root\resources\live_ui\mibu_logo.png",
            "$root\resources\live_ui\mibu_hood.png",
            "$root\resources\live_ui\mibu_app_icon.ico",
            "$root\resources\live_ui\firefox.png",
            "$root\resources\live_ui\chrome.png",
            "$root\resources\guide\index.html",
            "$root\resources\expected ui\android\approved_android_ui_baseline_sheet.svg",
            "$root\resources\expected ui\android\README.md",
            "$root\SHA256SUMS.txt"
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) { throw "Release contract missing: $path" }
            if ((Get-Item $path).Length -le 0) { throw "Release contract empty: $path" }
          }
      - uses: actions/upload-artifact@v4
        with:
          name: MIBU-PC-Helper-Windows
          path: pc-helper/release/MIBU-PC-Helper
          if-no-files-found: error
